        .toast {

        /* Responsive */

    <!-- Splash Screen -->

        <div class="search-filter-section">

    <div class="modal" id="downloadModal">

    <!-- Footer -->
    <div class="footer">

        <p>Join our <a href="#" id="footerTelegram">Telegram Channel</a> for updates</p>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCi0swHUNFwbBlYIn0SqQOv7kIpeicCDR0",
            authDomain: "tools-ai-75916.firebaseapp.com",
            databaseURL: "https://tools-ai-75916-default-rtdb.firebaseio.com",
            projectId: "tools-ai-75916",
            storageBucket: "tools-ai-75916.firebasestorage.app",
            messagingSenderId: "370558941971",
            appId: "1:370558941971:android:7adb8bc8289aa3c86c78e6"
        };

        // Firebase Initialize
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let allApps = [];
        let currentDownloadUrl = '';
        let currentAppName = '';
        let siteSettings = {};

        // Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // Load Site Settings
        function loadSiteSettings() {
            const settingsRef = database.ref('site_settings');
            settingsRef.on('value', (snapshot) => {
                if (snapshot.exists()) {
                    siteSettings = snapshot.val();
                    updateSiteUI();
                } else {
                    // Default settings
                    siteSettings = {
                        site_name: 'Premium Apps',
                        site_logo: 'https://via.placeholder.com/100/FF6B6B/FFFFFF?text=PA',
                        telegram_url: 'https://t.me/yourchannel',
                        site_description: 'Premium Apps Free Download'
                    };
                    updateSiteUI();
                }
            });
        }

        function updateSiteUI() {
            document.getElementById('splashTitle').textContent = siteSettings.site_name || 'Premium Apps';
            document.getElementById('siteName').textContent = siteSettings.site_name || 'Premium Apps';
            document.getElementById('footerName').textContent = siteSettings.site_name || 'Premium Apps';
            document.getElementById('splashLogo').src = siteSettings.site_logo || 'https://via.placeholder.com/100/FF6B6B/FFFFFF?text=PA';
            document.getElementById('headerLogo').src = siteSettings.site_logo || 'https://via.placeholder.com/45/FF6B6B/FFFFFF?text=PA';
            document.title = siteSettings.site_name || 'Premium Apps - Free Download';
            
            // Update Telegram links
            const telegramUrl = siteSettings.telegram_url || '#';
            document.getElementById('telegramBtn').href = telegramUrl;
            document.getElementById('footerTelegram').href = telegramUrl;
        }

        // Load Categories
        function loadCategories() {
            const categoriesRef = database.ref('categories');
            categoriesRef.on('value', (snapshot) => {
                const categoryContainer = document.getElementById('categoryFilters');
                categoryContainer.innerHTML = '<button class="category-btn active" onclick="filterByCategory(\'all\')">📱 All Apps</button>';
                
                if (snapshot.exists()) {
                    const categories = snapshot.val();
                    Object.keys(categories).forEach(key => {
                        const category = categories[key];
                        categoryContainer.innerHTML += `
                            <button class="category-btn" onclick="filterByCategory('${category.name}')">
                                ${category.icon || '📦'} ${category.name}
                            </button>
                        `;
                    });
                }
            });
        }

        // Load Apps
        function loadApps() {
            const appsRef = database.ref('apps');
            const appsContainer = document.getElementById('appsContainer');
            
            appsRef.on('value', (snapshot) => {
                appsContainer.innerHTML = '';
                
                if (snapshot.exists()) {
                    allApps = [];
                    const apps = snapshot.val();
                    const appKeys = Object.keys(apps);
                    
                    if (appKeys.length === 0) {
                        appsContainer.innerHTML = `
                            <div class="no-results">
                                <div class="emoji">📦</div>
                                <p>No apps available yet!</p>
                                <p style="color: #b8b8d4; margin-top: 10px;">Please check back later for new apps.</p>
                            </div>
                        `;
                        return;
                    }
                    
                    // Sort by newest first
                    appKeys.reverse();
                    
                    appKeys.forEach((key) => {
                        const app = apps[key];
                        allApps.push({ key, ...app });
                        
                        const isPremium = app.is_premium !== false; // Default premium true
                        
                        const appCard = `
                            <div class="app-card ${isPremium ? 'premium' : ''}" 
                                 data-name="${(app.name || '').toLowerCase()}"
                                 data-category="${(app.category || '').toLowerCase()}">
                                <div class="app-header">
                                    <div class="app-icon">
                                        <img src="${app.icon || 'https://via.placeholder.com/70/FF6B6B/FFFFFF?text=App'}" 
                                             alt="${app.name || 'App'}"
                                             onerror="this.src='https://via.placeholder.com/70/FF6B6B/FFFFFF?text=App'">
                                    </div>
                                    <div class="app-info">
                                        <h3 class="app-name">${app.name || 'Unknown App'}</h3>
                                        <p class="app-category">${app.category || 'General'}</p>
                                        <p class="app-rating">
                                            ⭐ ${app.rating || '4.5'} 
                                            <span style="color: #b8b8d4;">(${app.downloads || '0'} downloads)</span>
                                        </p>
                                    </div>
                                </div>
                                <p class="app-description">${app.description || 'No description available'}</p>
                                <div class="app-meta">
                                    <span class="app-size">📦 ${app.size || 'N/A'}</span>
                                    <span class="app-version">v${app.version || '1.0'}</span>
                                </div>
                                <div class="app-actions">
                                    <button class="btn btn-download" onclick="openDownloadModal('${key}')">
                                        ⬇️ Free Download
                                    </button>
                                    <button class="btn btn-details" onclick="shareApp('${app.name}', '${app.download_url || ''}')">
                                        📤
                                    </button>
                                </div>
                            </div>
                        `;
                        
                        appsContainer.innerHTML += appCard;
                    });
                } else {
                    appsContainer.innerHTML = `
                        <div class="no-results">
                            <div class="emoji">📦</div>
                            <p>No apps found in database!</p>
                            <p style="color: #b8b8d4; margin-top: 10px;">Add apps to Firebase to display here.</p>
                        </div>
                    `;
                }
            }, (error) => {
                console.error('Error loading apps:', error);
                appsContainer.innerHTML = `
                    <div class="no-results">
                        <div class="emoji">❌</div>
                        <p>Error loading apps!</p>
                        <p style="color: #ff6b6b; margin-top: 10px;">Please check Firebase connection.</p>
                    </div>
                `;
            });
        }

        // Filter Apps
        function filterApps() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const activeCategory = document.querySelector('.category-btn.active');
            const category = activeCategory ? activeCategory.textContent.trim().toLowerCase() : 'all';
            
            const appCards = document.querySelectorAll('.app-card');
            
            appCards.forEach(card => {
                const appName = card.getAttribute('data-name');
                const appCategory = card.getAttribute('data-category');
                
                let showBySearch = !searchTerm || (appName && appName.includes(searchTerm));
                let showByCategory = category === '📱 all apps' || (appCategory && appCategory.includes(category.replace(/[📱📦🎮🛠️📸🎵📚]/g, '').trim().toLowerCase()));
                
                if (showBySearch && showByCategory) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
            
            // Show no results message
            const visibleCards = document.querySelectorAll('.app-card[style*="display: block"], .app-card:not([style*="display: none"])');
            const existingNoResults = document.querySelector('.filter-no-results');
            
            if (visibleCards.length === 0 && !existingNoResults) {
                const noResultsDiv = document.createElement('div');
                noResultsDiv.className = 'no-results filter-no-results';
                noResultsDiv.innerHTML = `
                    <div class="emoji">🔍</div>
                    <p>No apps found matching your search!</p>
                    <p style="color: #b8b8d4; margin-top: 10px;">Try different keywords or category.</p>
                `;
                document.getElementById('appsContainer').appendChild(noResultsDiv);
            } else if (visibleCards.length > 0 && existingNoResults) {
                existingNoResults.remove();
            }
        }

        function filterByCategory(category) {
            // Update active button
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            filterApps();
        }

        // Download Modal
        function openDownloadModal(appKey) {
            const appRef = database.ref(`apps/${appKey}`);
            appRef.once('value', (snapshot) => {
                if (snapshot.exists()) {
                    const app = snapshot.val();
                    
                    document.getElementById('modalIcon').src = app.icon || 'https://via.placeholder.com/80/FF6B6B/FFFFFF?text=App';
                    document.getElementById('modalName').textContent = app.name;
                    document.getElementById('modalDescription').textContent = app.description || 'Download this premium app for free!';
                    
                    currentDownloadUrl = app.download_url;
                    currentAppName = app.name;
                    
                    document.getElementById('downloadModal').style.display = 'flex';
                }
            });
        }

        function startDownload() {
            if (currentDownloadUrl && currentDownloadUrl !== '') {
                // Track download
                const downloadsRef = database.ref('analytics/downloads');
                downloadsRef.push({
                    app_name: currentAppName,
                    timestamp: new Date().toISOString(),
                    user_agent: navigator.userAgent
                });
                
                showToast(`⬇️ Downloading ${currentAppName}...`, 'info');
                
                // Open download link
                setTimeout(() => {
                    window.open(currentDownloadUrl, '_blank');
                    closeModal();
                    showToast('✅ Download started! Enjoy the premium app!', 'success');
                }, 500);
            } else {
                showToast('⚠️ Download link not available!', 'error');
            }
        }

        function closeModal() {
            document.getElementById('downloadModal').style.display = 'none';
            currentDownloadUrl = '';
            currentAppName = '';
        }

        // Share App
        function shareApp(appName, downloadUrl) {
            if (navigator.share) {
                navigator.share({
                    title: appName,
                    text: `Download ${appName} for free! Premium app unlocked! 🎉`,
                    url: window.location.href,
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    showToast('✅ Link copied! Share with friends!', 'success');
                }).catch(() => {
                    prompt('Share this link:', window.location.href);
                });
            }
        }

        // Close modal on outside click
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                closeModal();
            }
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Premium Apps Loading...');
            loadSiteSettings();
            loadCategories();
            loadApps();
            
            // Hide splash screen
            setTimeout(() => {
                document.getElementById('splashScreen').style.display = 'none';
            }, 2500);
        });
    </script>
</body>
</html>
