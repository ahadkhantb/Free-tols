<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tools Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            padding-top: 30px;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        .header p {
            color: #b8b8d4;
            font-size: 1.2rem;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 2px #e6683c);
            }
            to {
                filter: drop-shadow(0 0 10px #f09433);
            }
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            border-radius: 20px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .tool-card:hover::before {
            opacity: 1;
            animation: borderRotate 3s linear infinite;
        }

        .tool-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .tool-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tool-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px;
            transition: transform 0.3s ease;
        }

        .tool-card:hover .tool-icon {
            transform: rotate(5deg) scale(1.1);
        }

        .tool-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        .tool-name {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .tool-description {
            color: #b8b8d4;
            font-size: 0.9rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(45deg, #f09433, #e6683c);
            color: white;
            box-shadow: 0 5px 15px rgba(240, 148, 51, 0.4);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(240, 148, 51, 0.6);
        }

        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            padding: 50px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #f09433;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #f09433;
            box-shadow: 0 0 20px rgba(240, 148, 51, 0.3);
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 10px;
            margin: 20px;
        }

        .no-tools {
            color: white;
            text-align: center;
            font-size: 1.2rem;
            padding: 50px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .tools-grid {
                grid-template-columns: 1fr;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Premium Tools Hub</h1>
            <p>Access all your premium tools in one place</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search for tools..." onkeyup="filterTools()">
        </div>

        <div class="tools-grid" id="toolsContainer">
            <div class="loading">
                <div class="loader"></div>
                <p>Loading premium tools...</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        // আপনার Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCi0swHUNFwbBlYIn0SqQOv7kIpeicCDR0",
            authDomain: "tools-ai-75916.firebaseapp.com",
            databaseURL: "https://tools-ai-75916-default-rtdb.firebaseio.com",
            projectId: "tools-ai-75916",
            storageBucket: "tools-ai-75916.firebasestorage.app",
            messagingSenderId: "370558941971",
            appId: "1:370558941971:android:7adb8bc8289aa3c86c78e6"
        };

        // Firebase Initialize
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let allTools = [];

        // কানেকশন স্টেটাস চেক
        const connectedRef = database.ref(".info/connected");
        connectedRef.on("value", (snap) => {
            if (snap.val() === true) {
                console.log("✅ Firebase Connected Successfully!");
            } else {
                console.log("❌ Firebase Disconnected!");
                document.getElementById('toolsContainer').innerHTML = 
                    '<div class="error-message">⚠️ Connection lost! Please check your internet connection.</div>';
            }
        });

        // Tools Load করার Function
        function loadTools() {
            const toolsRef = database.ref('tools');
            const toolsContainer = document.getElementById('toolsContainer');
            
            // Loading দেখান
            toolsContainer.innerHTML = `
                <div class="loading">
                    <div class="loader"></div>
                    <p>Loading premium tools...</p>
                </div>
            `;
            
            toolsRef.on('value', (snapshot) => {
                toolsContainer.innerHTML = '';
                
                if (snapshot.exists()) {
                    allTools = [];
                    const tools = snapshot.val();
                    
                    Object.keys(tools).forEach((key) => {
                        const tool = tools[key];
                        allTools.push(tool);
                        
                        const toolCard = `
                            <div class="tool-card" data-name="${tool.name ? tool.name.toLowerCase() : ''}">
                                <div class="tool-badge">Premium</div>
                                <div class="tool-icon">
                                    <img src="${tool.image || 'https://via.placeholder.com/100'}" 
                                         alt="${tool.name || 'Tool'}" 
                                         onerror="this.src='https://via.placeholder.com/100/FF6B6B/FFFFFF?text=Tool'">
                                </div>
                                <h2 class="tool-name">${tool.name || 'Unnamed Tool'}</h2>
                                <p class="tool-description">${tool.description || 'Amazing premium tool for you'}</p>
                                <div class="btn-group">
                                    <a href="${tool.url || '#'}" target="_blank" class="btn btn-primary">
                                        Open Tool 🔥
                                    </a>
                                    <button class="btn btn-outline" onclick="shareTool('${tool.name || 'Tool'}', '${tool.url || '#'}')">
                                        Share 📤
                                    </button>
                                </div>
                            </div>
                        `;
                        
                        toolsContainer.innerHTML += toolCard;
                    });

                    // যদি কোন টুল না থাকে
                    if (Object.keys(tools).length === 0) {
                        toolsContainer.innerHTML = `
                            <div class="no-tools">
                                <p>📦 No tools available yet. Add tools to your Firebase database!</p>
                            </div>
                        `;
                    }
                } else {
                    toolsContainer.innerHTML = `
                        <div class="no-tools">
                            <p>📦 No tools found in database!</p>
                            <p style="font-size: 0.9rem; margin-top: 10px; color: #b8b8d4;">
                                Add tools to your Firebase database to see them here.
                            </p>
                        </div>
                    `;
                }
            }, (error) => {
                console.error("Error loading tools:", error);
                toolsContainer.innerHTML = `
                    <div class="error-message">
                        <p>❌ Error loading tools!</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">${error.message}</p>
                        <button class="btn btn-primary" style="margin-top: 15px;" onclick="loadTools()">
                            Retry 🔄
                        </button>
                    </div>
                `;
            });
        }

        // Search Function
        function filterTools() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const toolCards = document.querySelectorAll('.tool-card');
            
            if (searchTerm === '') {
                // সব টুল দেখান
                toolCards.forEach(card => {
                    card.style.display = 'block';
                });
                return;
            }
            
            toolCards.forEach(card => {
                const toolName = card.getAttribute('data-name');
                if (toolName && toolName.includes(searchTerm)) {
                    card.style.display = 'block';
                } else if (toolName) {
                    card.style.display = 'none';
                }
            });
        }

        // Share Function
        function shareTool(toolName, toolUrl) {
            if (navigator.share) {
                navigator.share({
                    title: toolName,
                    text: `Check out this amazing tool: ${toolName}`,
                    url: toolUrl,
                }).catch(console.error);
            } else {
                // Fallback: ক্লিপবোর্ডে কপি
                navigator.clipboard.writeText(toolUrl).then(() => {
                    alert('✅ Link copied to clipboard! 📋');
                }).catch(() => {
                    prompt('Copy this link:', toolUrl);
                });
            }
        }

        // Page Load হলে Tools Load হবে
        window.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Starting Firebase connection...');
            loadTools();
        });

        // Error handling for Firebase initialization
        window.addEventListener('error', (event) => {
            if (event.target.tagName === 'SCRIPT') {
                console.error('❌ Failed to load Firebase SDK');
                document.getElementById('toolsContainer').innerHTML = `
                    <div class="error-message">
                        <p>❌ Failed to load required resources!</p>
                        <p style="font-size: 0.9rem;">Please check your internet connection and refresh the page.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
